<svg width="720" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 7" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1971c2"/>
    </marker>
  </defs>

  <!-- ░░░ 白色背景 ░░░ -->
  <rect width="720" height="300" fill="#ffffff"/>

  <!-- ═══ 主标题 ═══ -->
  <text x="360" y="30" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="18" font-weight="bold" fill="#1e1e2e">多个不可变引用可以共存</text>

  <!-- ─────────────────────────────────────────────────── -->
  <!--  LEFT  Stack 栈区域（灰色虚线边框）                 -->
  <!-- ─────────────────────────────────────────────────── -->
  <rect x="20" y="42" width="220" height="200" rx="12"
        fill="#f8f9fa" stroke="#868e96" stroke-width="2"
        stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="66" y="36" width="60" height="14" fill="#ffffff"/>
  <text x="96" y="48" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" fill="#868e96">Stack 栈</text>

  <!-- ── r1: &String 蓝色小盒子 ── -->
  <rect x="40" y="56" width="180" height="48" rx="8"
        fill="#e7f5ff" stroke="#1971c2" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="41" y="57" width="178" height="22" rx="7" fill="#d0ebff"/>
  <rect x="41" y="70" width="178" height="9"  fill="#d0ebff"/>
  <text x="130" y="72" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#1971c2">r1: &amp;String</text>
  <line x1="40" y1="79" x2="220" y2="79"
        stroke="#1971c2" stroke-width="1" stroke-linecap="round"/>
  <text x="56" y="97" font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" fill="#1e1e2e">ptr</text>
  <line x1="76" y1="92" x2="210" y2="92"
        stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="210,88.5 220,92 210,95.5" fill="#1971c2"/>

  <!-- ── r2: &String 蓝色小盒子 ── -->
  <rect x="40" y="116" width="180" height="48" rx="8"
        fill="#e7f5ff" stroke="#1971c2" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="41" y="117" width="178" height="22" rx="7" fill="#d0ebff"/>
  <rect x="41" y="130" width="178" height="9"  fill="#d0ebff"/>
  <text x="130" y="132" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#1971c2">r2: &amp;String</text>
  <line x1="40" y1="139" x2="220" y2="139"
        stroke="#1971c2" stroke-width="1" stroke-linecap="round"/>
  <text x="56" y="157" font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" fill="#1e1e2e">ptr</text>
  <line x1="76" y1="152" x2="210" y2="152"
        stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="210,148.5 220,152 210,155.5" fill="#1971c2"/>

  <!-- ── r3: &String 蓝色小盒子 ── -->
  <rect x="40" y="176" width="180" height="48" rx="8"
        fill="#e7f5ff" stroke="#1971c2" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="41" y="177" width="178" height="22" rx="7" fill="#d0ebff"/>
  <rect x="41" y="190" width="178" height="9"  fill="#d0ebff"/>
  <text x="130" y="192" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#1971c2">r3: &amp;String</text>
  <line x1="40" y1="199" x2="220" y2="199"
        stroke="#1971c2" stroke-width="1" stroke-linecap="round"/>
  <text x="56" y="217" font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" fill="#1e1e2e">ptr</text>
  <line x1="76" y1="212" x2="210" y2="212"
        stroke="#1971c2" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="210,208.5 220,212 210,215.5" fill="#1971c2"/>

  <!-- ─────────────────────────────────────────────────── -->
  <!--  RIGHT  Heap 堆区域（灰色虚线边框）                 -->
  <!-- ─────────────────────────────────────────────────── -->
  <rect x="410" y="42" width="280" height="220" rx="12"
        fill="#f8f9fa" stroke="#868e96" stroke-width="2"
        stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="532" y="36" width="52" height="14" fill="#ffffff"/>
  <text x="558" y="48" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" fill="#868e96">Heap 堆</text>

  <!-- ── data: String 绿色盒子 ── -->
  <rect x="430" y="102" width="240" height="100" rx="10"
        fill="#ebfbee" stroke="#2f9e44" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="431" y="103" width="238" height="26" rx="9" fill="#d3f9d8"/>
  <rect x="431" y="119" width="238" height="10"       fill="#d3f9d8"/>
  <text x="550" y="120" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="13" font-weight="bold" fill="#2f9e44">data: String</text>
  <line x1="430" y1="129" x2="670" y2="129"
        stroke="#2f9e44" stroke-width="1.5" stroke-linecap="round"/>
  <text x="550" y="168" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="16" fill="#1e1e2e">"共享数据"</text>

  <!-- ═══ 收敛箭头：三条引用 → 同一块堆数据 ═══ -->
  <!-- r1 ptr → 堆数据左侧偏上 -->
  <path d="M 220 92 C 316 92, 390 138, 430 146"
        fill="none" stroke="#1971c2" stroke-width="2.2"
        stroke-linecap="round" marker-end="url(#arr-blue)"/>
  <!-- r2 ptr → 堆数据左侧中部 -->
  <path d="M 220 152 C 310 152, 392 152, 430 152"
        fill="none" stroke="#1971c2" stroke-width="2.2"
        stroke-linecap="round" marker-end="url(#arr-blue)"/>
  <!-- r3 ptr → 堆数据左侧偏下 -->
  <path d="M 220 212 C 316 212, 390 168, 430 158"
        fill="none" stroke="#1971c2" stroke-width="2.2"
        stroke-linecap="round" marker-end="url(#arr-blue)"/>

  <!-- 中间汇聚点标注小点 -->
  <circle cx="370" cy="152" r="4" fill="#1971c2" opacity="0.35"/>

  <!-- ═══ 右下角成功标签 ═══ -->
  <rect x="438" y="222" width="232" height="32" rx="8"
        fill="#ebfbee" stroke="#2f9e44" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <text x="554" y="243" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="12" font-weight="bold" fill="#2f9e44">✅ 读-读不冲突，天然安全</text>

  <!-- ═══ 底部注释 ═══ -->
  <text x="360" y="283" text-anchor="middle"
        font-family="'Virgil','Comic Sans MS',cursive"
        font-size="11" fill="#868e96">📖  所有引用都只读，就像多人同时阅读同一本书</text>
</svg>